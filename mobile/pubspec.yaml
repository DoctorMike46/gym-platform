name: gym_platform_mobile
description: "Gym Platform — mobile client app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  lottie: ^3.1.3
  flutter_animate: ^4.5.2

  # Camera / image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Connectivity
  connectivity_plus: ^6.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Deep linking
  app_links: ^6.3.2

  # Utils
  intl: ^0.20.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  file_picker: ^11.0.2
  health: ^13.3.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^2.6.4
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.4

  # Genera icone app (iOS + Android) da un singolo PNG sorgente.
  # Uso: `flutter pub run flutter_launcher_icons` dopo aver impostato la config sotto.
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  # Sostituisci con il path alla tua icona 1024x1024 PNG (senza canale alpha per iOS).
  image_path: "assets/icon/app_icon.png"
  # Adaptive icon Android (opzionale, consigliato): immagine in primo piano + colore di sfondo.
  # adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
