name: gym_platform_mobile
description: "Gym Platform — mobile client app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  lottie: ^3.1.3
  flutter_animate: ^4.5.2

  # Camera / image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Connectivity
  connectivity_plus: ^6.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Deep linking
  app_links: ^6.3.2

  # Utils
  intl: ^0.20.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  file_picker: ^11.0.2
  health: ^13.3.1
  permission_handler: ^12.0.1
  webview_flutter: ^4.10.0      # In-app browser per pagine legali (privacy/ToS)

  # Sicurezza
  crypto: ^3.0.6          # H3 — certificate pinning (sha256 del cert leaf)
  local_auth: ^2.3.0      # H7 — biometric auth (FaceID / TouchID / Android Biometric)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^2.6.4
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.4

  # Genera icone app (iOS + Android) da un singolo PNG sorgente.
  # Uso: `dart run flutter_launcher_icons` dopo aver impostato la config sotto.
  flutter_launcher_icons: ^0.14.4

  # Genera splash screen native iOS + Android partendo da un PNG.
  # Uso: `dart run flutter_native_splash:create` dopo aver impostato la config.
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  # Sorgente: PNG 1024x1024 senza testo (icon.kitchen → "Source").
  image_path: "assets/icon/app_icon.png"
  # Adaptive icon Android (Android 8+): sfondo nero coerente col logo.
  # Il foreground usa la stessa immagine (con padding interno automatico).
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# Splash screen native iOS + Android.
flutter_native_splash:
  # Sfondo nero, coerente con il logo EG Elevate Performance.
  color: "#000000"
  color_dark: "#000000"
  # Logo centrato (PNG con alpha, idealmente quadrato 1024x1024).
  image: "assets/icon/app_icon.png"
  image_dark: "assets/icon/app_icon.png"
  android: true
  ios: true
  # Android 12+: usa il sistema splash con icona centrale.
  android_12:
    image: "assets/icon/app_icon.png"
    icon_background_color: "#000000"
    image_dark: "assets/icon/app_icon.png"
    icon_background_color_dark: "#000000"
  # Niente fullscreen né web (l'app non è web).
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
